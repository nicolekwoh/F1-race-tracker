<title>Race Tracker — F1 &amp; F2</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Race Tracker">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root{
    --bg:#0a0a0c;
    --card:#151518;
    --card-border:#25252a;
    --red:#e10600;
    --text:#f2f2f2;
    --muted:#8a8a92;
    --meta:#c3c3cc;
    --dim:#55555c;
    --done:#3a3a40;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text);}
  body{
    font-family:'Titillium Web', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height:100vh;
    padding-bottom:40px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px; margin:0 auto; padding:0 16px;}

  /* header */
  header.top{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 4px 10px;
  }
  header.top .brand{
    display:flex; align-items:center; gap:8px;
    font-weight:900; letter-spacing:0.5px; font-size:15px; text-transform:uppercase;
  }
  header.top .brand svg, header.top .brand img{flex-shrink:0;}
  header.top .tz{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:0.5px;}

  /* hero */
  .hero{
    background:linear-gradient(160deg, #17171b 0%, #0e0e10 100%);
    border:1px solid var(--card-border);
    border-radius:20px;
    padding:26px 22px 22px;
    margin-top:6px;
    position:relative;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute; top:0; right:0; width:120px; height:120px;
    background:repeating-conic-gradient(#1c1c20 0% 25%, #0a0a0c 0% 50%) 50% / 14px 14px;
    opacity:0.5;
    -webkit-mask-image:radial-gradient(circle at top right, black, transparent 70%);
    mask-image:radial-gradient(circle at top right, black, transparent 70%);
  }
  .hero-label{
    font-size:11px; font-weight:700; letter-spacing:2px; color:var(--red);
    text-transform:uppercase; margin-bottom:10px; position:relative;
  }
  .hero-race{font-size:24px; font-weight:900; line-height:1.2; position:relative;}
  .hero-session{font-size:15px; font-weight:600; color:#d8d8dc; margin-top:4px; position:relative;}
  .hero-datetime{
    font-size:17px; font-weight:700; color:var(--text); margin-top:14px; position:relative;
  }
  .hero-datetime .et{color:var(--muted); font-weight:600; font-size:13px; margin-left:4px;}
  .hero-location{font-size:13px; color:var(--meta); margin-top:4px; position:relative;}

  .hero-weekend{
    margin-top:18px; padding-top:14px; border-top:1px solid #232327; position:relative;
  }
  .hero-weekend .series-label{
    font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:#6e6e78; margin-bottom:6px;
  }
  .hero-weekend .sess-row.is-next{
    background:rgba(225,6,0,0.08); border-radius:8px; margin:0 -8px; padding:8px;
  }
  .hero-weekend .sess-row.is-next .sess-name{color:var(--red); font-weight:700;}
  .hero-weekend .sess-row.is-next .sess-when{color:var(--text); font-weight:700;}

  .cd-caption{
    font-size:11px; color:var(--muted); margin-top:16px; letter-spacing:0.5px; position:relative;
  }
  .countdown{
    display:flex; gap:10px; margin-top:8px; position:relative;
  }
  .cd-block{
    flex:1; background:#0a0a0c; border:1px solid var(--card-border);
    border-radius:12px; padding:10px 4px; text-align:center;
  }
  .cd-block .num{font-size:26px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1;}
  .cd-block .lab{font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:5px; display:block;}

  .hero.live .hero-label{color:#2ecc40;}
  .hero.live .cd-block .num{color:#2ecc40;}

  /* section title */
  .sect-title{
    font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted); margin:30px 4px 12px;
  }

  /* calendar */
  .round-card{
    background:var(--card); border:1px solid var(--card-border); border-radius:16px;
    padding:16px 16px 14px; margin-bottom:12px;
  }
  .round-card.next{border-color:var(--red); box-shadow:0 0 0 1px var(--red) inset;}

  .round-head{display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:2px;}
  .round-name{font-size:15px; font-weight:700;}
  .round-badge{
    font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    padding:3px 8px; border-radius:20px; white-space:nowrap;
  }
  .round-badge.next{background:var(--red); color:#fff;}
  .round-badge.upcoming{background:#1e1e22; color:var(--meta);}

  .round-meta{margin-bottom:12px; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .round-dates{font-size:16px; font-weight:700; color:var(--text);}
  .round-loc{font-size:12px; color:var(--meta); font-weight:500;}

  .sess-list{display:flex; flex-direction:column; gap:0; margin-top:8px;}
  .sess-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 8px 8px 12px; margin:0 -8px; border-radius:8px;
    font-size:13px; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:background .12s ease;
  }
  .sess-row + .sess-row{border-top:1px solid #1e1e22;}
  .sess-row:active{background:rgba(255,255,255,0.05);}
  .sess-row.f1{box-shadow:inset 3px 0 0 rgba(225,6,0,0.55);}
  .sess-row.f2{box-shadow:inset 3px 0 0 rgba(59,130,246,0.6);}
  .sess-row.f3{box-shadow:inset 3px 0 0 rgba(167,139,250,0.6);}
  .sess-row.past.f1{box-shadow:inset 3px 0 0 rgba(225,6,0,0.2);}
  .sess-row.past.f2{box-shadow:inset 3px 0 0 rgba(59,130,246,0.22);}
  .sess-row.past.f3{box-shadow:inset 3px 0 0 rgba(167,139,250,0.24);}
  .sess-name{color:var(--text); font-weight:600; display:flex; align-items:center; gap:7px;}
  .sess-row.past .sess-name{color:var(--dim); font-weight:400; text-decoration:line-through; text-decoration-color:#3a3a40;}
  .sess-when{display:flex; align-items:center; gap:8px; color:var(--meta); font-variant-numeric:tabular-nums; font-weight:600;}
  .sess-row.past .sess-when{color:var(--done); font-weight:400;}

  .tag{
    font-size:9px; font-weight:700; letter-spacing:0.5px; padding:2px 5px;
    border-radius:4px; line-height:1.4; flex-shrink:0;
  }
  .tag.f1{background:rgba(225,6,0,0.16); color:#ff6a62; border:1px solid rgba(225,6,0,0.4);}
  .tag.f2{background:rgba(59,130,246,0.16); color:#7fb3ff; border:1px solid rgba(59,130,246,0.45);}
  .tag.f3{background:rgba(167,139,250,0.16); color:#c1adff; border:1px solid rgba(167,139,250,0.45);}
  .tag.next{background:var(--red); color:#fff; border:1px solid var(--red);}
  .sess-row.past .tag{opacity:0.55;}

  .sess-row.selected{background:rgba(255,183,3,0.10);}
  .sess-row.selected + .sess-row{border-top-color:transparent;}
  .sess-row.selected .sess-name::before{
    content:"\2713"; color:#ffb703; font-weight:900; font-size:12px;
  }
  .sess-row.selected .sess-when{color:#ffcf6b;}
  .sess-row.selected.past{background:rgba(255,183,3,0.05);}
  .sess-row.selected.past .sess-name::before{color:#7a6a3a;}

  footer{
    text-align:center; color:var(--dim); font-size:11px; margin-top:28px; line-height:1.6;
  }
</style>
</head>

{round:9,name:"Spanish",location:"Madrid",sessions:{practice:"2026-09-11T06:45:00Z",qualifying:"2026-09-11T09:55:00Z",sprint:"2026-09-12T14:45:00Z",feature:"2026-09-13T07:20:00Z"}}
];

const F1_SESSION_ORDER = [
  ["fp1","Practice 1"],["fp2","Practice 2"],["fp3","Practice 3"],
  ["sprintQualifying","Sprint Qualifying"],["sprint","Sprint"],
  ["qualifying","Qualifying"],["gp","Race"]
];
const F2_SESSION_ORDER = [
  ["practice","Practice"],["qualifying","Qualifying"],
  ["sprint","Sprint Race"],["feature","Feature Race"]
];
const F3_SESSION_ORDER = [
  ["practice","Practice"],["qualifying","Qualifying"],
  ["sprint","Sprint Race"],["feature","Feature Race"]
];

// a few venues are named differently across F1/F2/F3 feeds despite being the same location
const LOCATION_ALIASES = { "catalunya": "barcelona" };

function norm(s){
  const n = s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().trim();
  return LOCATION_ALIASES[n] || n;
}

/* merge F1 rounds with matching F2/F3 rounds by normalized location */
const merged = F1_ROUNDS.map(r1 => {
  const r2 = F2_ROUNDS.find(x => norm(x.location) === norm(r1.location));
  const r3 = F3_ROUNDS.find(x => norm(x.location) === norm(r1.location));
  return {
    round: r1.round,
    name: r1.name,
    location: r1.location,
    f1: r1.sessions,
    f2: r2 ? r2.sessions : null,
    f3: r3 ? r3.sessions : null
  };
});

/* ---------- time formatting (America/New_York) ---------- */
const dtFmt = new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
const tFmt = new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit"});
const monthDayFmt = new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",month:"short",day:"numeric"});
const monthFmt = new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",month:"short"});
const dayFmt = new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",day:"numeric"});

function fmtDate(d){ return dtFmt.format(d); }
function fmtTime(d){ return tFmt.format(d); }
function fmtDateRange(start, end){
  const sameMonth = monthFmt.format(start) === monthFmt.format(end);
  if(sameMonth){
    return monthFmt.format(start) + " " + dayFmt.format(start) + "–" + dayFmt.format(end);
  }
  return monthDayFmt.format(start) + "–" + monthDayFmt.format(end);
}

/* ---------- "watching" selections (persisted on-device) ---------- */
const SELECTED_KEY = "raceTrackerSelectedSessions";
function loadSelected(){
  try{ return new Set(JSON.parse(localStorage.getItem(SELECTED_KEY) || "[]")); }
  catch(e){ return new Set(); }
}
function saveSelected(){
  try{ localStorage.setItem(SELECTED_KEY, JSON.stringify([...selectedSessions])); }
  catch(e){}
}
const selectedSessions = loadSelected();

function toggleSession(id){
  if(selectedSessions.has(id)) selectedSessions.delete(id);
  else selectedSessions.add(id);
  saveSelected();
  const isSel = selectedSessions.has(id);
  document.querySelectorAll('[data-id="' + id + '"]').forEach(el => {
    el.classList.toggle("selected", isSel);
  });
}

function handleSessClick(e){
  const row = e.target.closest(".sess-row");
  if(!row) return;
  const id = row.getAttribute("data-id");
  if(!id) return;
  toggleSession(id);
}

/* ---------- next F1 session across whole season ---------- */
function getAllF1Sessions(){
  const list = [];
  merged.forEach(r=>{
    F1_SESSION_ORDER.forEach(([key,label])=>{
      if(r.f1[key]){
        list.push({round:r, key, label, date:new Date(r.f1[key])});
      }
    });
  });
  return list.sort((a,b)=>a.date-b.date);
}

let nextSession = null;
let liveSession = null; // if currently within ~3hrs after start, treat as "live-ish" fallback

function computeNext(){
  const now = new Date();
  const all = getAllF1Sessions();
  nextSession = all.find(s => s.date > now) || null;
}

function renderHero(){
  const now = new Date();
  if(!nextSession){
    document.getElementById("hero-race").textContent = "Season complete";
    document.getElementById("hero-session").textContent = "See you next year";
    document.getElementById("hero-datetime").textContent = "";
    document.getElementById("hero-location").textContent = "";
    document.getElementById("hero-weekend").innerHTML = "";
    document.getElementById("cd-caption").textContent = "";
    document.getElementById("countdown").style.display = "none";
    return;
  }
  const r = nextSession.round;
  document.getElementById("hero-label").textContent = "NEXT UP · F1";
  document.getElementById("hero-race").textContent = r.name + " Grand Prix";
  document.getElementById("hero-session").textContent = nextSession.label;
  document.getElementById("hero-datetime").innerHTML =
    fmtDate(nextSession.date) + " · " + fmtTime(nextSession.date) + '<span class="et">ET</span>';
  document.getElementById("hero-location").textContent = r.location;
  document.getElementById("hero-weekend").innerHTML =
    buildSessList("Race Weekend", r.round, r.f1, F1_SESSION_ORDER, now, nextSession.key);
  document.getElementById("cd-caption").textContent = "Countdown to " + nextSession.label;
}

function pad(n){ return String(n).padStart(2,"0"); }

function tickCountdown(){
  if(!nextSession) return;
  const now = new Date();
  let diff = nextSession.date - now;
  const hero = document.getElementById("hero");
  if(diff <= 0){
    // session has started/passed; recompute next
    computeNext();
    renderHero();
    renderCalendar();
    diff = nextSession ? nextSession.date - now : 0;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById("cd-d").textContent = pad(d);
  document.getElementById("cd-h").textContent = pad(h);
  document.getElementById("cd-m").textContent = pad(m);
  document.getElementById("cd-s").textContent = pad(s);
}

/* ---------- calendar ---------- */
function renderCalendar(){
  const now = new Date();
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  // only show rounds that haven't finished yet (final F1 session still ahead)
  const upcoming = merged.filter(r => new Date(r.f1.gp) > now);

  upcoming.forEach((r, idx) => {
    const card = document.createElement("div");
    const status = idx === 0 ? "next" : "upcoming";
    card.className = "round-card " + status;
    card.id = "round-" + r.round;

    const firstDate = r.f2 ? new Date(Math.min(new Date(r.f1.fp1 || r.f1.fp2), new Date(r.f2.practice))) : new Date(r.f1.fp1 || r.f1.fp2);
    const lastDate = new Date(r.f1.gp);
    const dateRange = fmtDateRange(firstDate, lastDate);

    const badgeLabel = status === "next" ? "Next" : "Upcoming";

    let html = `
      <div class="round-head">
        <div class="round-name">${r.name} Grand Prix</div>
        <div class="round-badge ${status}">${badgeLabel}</div>
      </div>
      <div class="round-meta">
        <span class="round-dates">${dateRange}</span>
        <span class="round-loc">${r.location}</span>
      </div>
    `;

    html += buildMixedSessList(r, now);

    card.innerHTML = html;
    container.appendChild(card);
  });

  return upcoming.length ? upcoming[0].round : null;
}

/* combine F1 + F2 sessions for a round into one chronological, tagged list */
function buildMixedSessList(r, now){
  const rows = [];
  F1_SESSION_ORDER.forEach(([key,label])=>{
    if(r.f1[key]) rows.push({tag:"F1", key, label, date:new Date(r.f1[key])});
  });
  if(r.f2){
    F2_SESSION_ORDER.forEach(([key,label])=>{
      if(r.f2[key]) rows.push({tag:"F2", key, label, date:new Date(r.f2[key])});
    });
  }
  if(r.f3){
    F3_SESSION_ORDER.forEach(([key,label])=>{
      if(r.f3[key]) rows.push({tag:"F3", key, label, date:new Date(r.f3[key])});
    });
  }
  rows.sort((a,b)=>a.date-b.date);

  let html = "";
  rows.forEach(row=>{
    const isPast = row.date < now;
    const id = r.round + "_" + row.tag + "_" + row.key;
    const isSel = selectedSessions.has(id);
    const seriesClass = row.tag.toLowerCase();
    // "Race" is ambiguous next to F2's "Feature Race" in a mixed list — use the full F1 term here
    const displayLabel = (row.tag === "F1" && row.key === "gp") ? "Grand Prix" : row.label;
    html += `
      <div class="sess-row ${seriesClass} ${isPast ? 'past' : ''} ${isSel ? 'selected' : ''}" data-id="${id}">
        <div class="sess-name"><span class="tag ${seriesClass}">${row.tag}</span> ${displayLabel}</div>
        <div class="sess-when">${fmtDate(row.date)} · ${fmtTime(row.date)}</div>
      </div>
    `;
  });
  return `<div class="sess-list">${html}</div>`;
}

/* hero: F1-only weekend list (kept separate from the mixed calendar view) */
function buildSessList(seriesLabel, roundNumber, sessions, order, now, nextKey){
  let rows = "";
  order.forEach(([key,label])=>{
    if(!sessions[key]) return;
    const d = new Date(sessions[key]);
    const isPast = d < now;
    const isNext = key === nextKey;
    const id = roundNumber + "_F1_" + key;
    const isSel = selectedSessions.has(id);
    rows += `
      <div class="sess-row f1 ${isPast ? 'past' : ''} ${isNext ? 'is-next' : ''} ${isSel ? 'selected' : ''}" data-id="${id}">
        <div class="sess-name">${label}${isNext ? ' <span class="tag next">NEXT</span>' : ''}</div>
        <div class="sess-when">${fmtDate(d)} · ${fmtTime(d)}</div>
      </div>
    `;
  });
  return `<div class="series-row"><div class="series-label">${seriesLabel}</div><div class="sess-list">${rows}</div></div>`;
}

/* ---------- default scroll: land on the race after the next one ---------- */
function scrollToDefault(nextRoundNumber){
  if(nextRoundNumber == null) return;
  const nextIdxInSeason = merged.findIndex(r => r.round === nextRoundNumber);
  const targetRound = merged[nextIdxInSeason + 1];
  if(!targetRound) return;
  const el = document.getElementById("round-" + targetRound.round);
  if(el){
    // leave a little room so the section title peeks above it
    const y = el.getBoundingClientRect().top + window.pageYOffset - 44;
    window.scrollTo({top: Math.max(0, y), behavior: "auto"});
  }
}

/* ---------- init ---------- */
computeNext();
renderHero();
const nextRoundNumberAtLoad = renderCalendar();
tickCountdown();
setInterval(tickCountdown, 1000);

document.getElementById("calendar").addEventListener("click", handleSessClick);
document.getElementById("hero-weekend").addEventListener("click", handleSessClick);

window.addEventListener("load", () => {
  setTimeout(() => scrollToDefault(nextRoundNumberAtLoad), 50);
});

/* service worker for installability (best effort, safe to fail) */
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
